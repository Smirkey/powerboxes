version: 2
updates:
  # Rust dependencies (powerboxesrs)
  - package-ecosystem: cargo
    directory: /powerboxesrs
    schedule:
      interval: weekly
    groups:
      rust-deps:
        patterns: ["*"]

  # Rust dependencies (bindings)
  - package-ecosystem: cargo
    directory: /bindings
    schedule:
      interval: weekly
    groups:
      rust-bindings-deps:
        patterns: ["*"]

  # Python dependencies (bindings)
  - package-ecosystem: pip
    directory: /bindings
    schedule:
      interval: weekly
    groups:
      python-deps:
        patterns: ["*"]

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]
